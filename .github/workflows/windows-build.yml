name: Windows Build

on:
  push:
    branches:
      - main
      - master

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Kodu Çek (Checkout)
        uses: actions/checkout@v4

      - name: Node.js Kurulumu (Uyarıyı çözmek için Node 22)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Rust Kurulumu
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust Önbelleği (Derlemeyi hızlandırmak için)
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Bağımlılıkları Yükle
        run: npm install

      - name: Tauri Uygulamasını Derle (Windows)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          args: --target x86_64-pc-windows-msvc

      - name: Kurulum Dosyalarını Actions Sekmesine Yükle (Eserler/Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: VB-Windows-Kurulum-Dosyalari
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi