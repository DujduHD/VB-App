name: Windows Build

on:
  push:
    branches:
      - main
      - master

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Kodu Çek (Checkout)
        uses: actions/checkout@v5

      - name: Node.js Kurulumu
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Rust Kurulumu
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Önbelleği (Derlemeyi hızlandırmak için)
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Bağımlılıkları Yükle
        run: npm ci

      - name: Tauri Uygulamasını Derle (Windows)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          args: ''

      - name: Kurulum Dosyalarını Doğrula
        shell: pwsh
        run: |
          $bundleRoot = "src-tauri/target/release/bundle"
          if (-not (Test-Path $bundleRoot)) {
            Write-Error "Bundle klasörü bulunamadı: $bundleRoot"
          }
          Get-ChildItem -Path $bundleRoot -Recurse -Include *.exe,*.msi | ForEach-Object { $_.FullName }

      - name: Kurulum Dosyalarını Actions Sekmesine Yükle (Eserler/Artifacts)
        uses: actions/upload-artifact@v5
        with:
          name: VB-Windows-Kurulum-Dosyalari
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
